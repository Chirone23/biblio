<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .badge{font:600 11px var(--font-sans);padding:5px 10px;border-radius:var(--r-pill);display:inline-flex;align-items:center;gap:5px;letter-spacing:.04em;}
  .new{background:var(--biblio-coral);color:#fff;}
  .plus{background:var(--biblio-gold);color:var(--biblio-ink);}
  .rent{background:var(--biblio-rent-soft);color:var(--biblio-rent);border:1px solid var(--biblio-rent);}
  .cat{background:transparent;color:var(--biblio-navy);border:1px solid var(--biblio-navy);}
  .soft{background:var(--biblio-cream-deep);color:var(--fg-soft);}
  .out{background:#fff;color:var(--fg);border:1px solid var(--border);}
</style></head>
<body>
  <span class="badge new">Novità</span>
  <span class="badge plus">✨ Plus</span>
  <span class="badge rent">📦 Noleggiabile</span>
  <span class="badge cat">Narrativa</span>
  <span class="badge soft">ISBN 978-88-04</span>
  <span class="badge out">⭐ 4,6</span>
</body></html>

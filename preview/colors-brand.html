<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg);}
  .row{display:flex;gap:12px;align-items:stretch;}
  .sw{flex:1;border-radius:var(--r-md);padding:14px;display:flex;flex-direction:column;justify-content:space-between;min-height:100px;border:1px solid var(--border);}
  .sw .n{font-family:var(--font-sans);font-size:13px;font-weight:600;}
  .sw .h{font-family:var(--font-mono);font-size:11px;opacity:.8;}
  .sw.l{color:var(--fg);} .sw.d{color:#F5F1E8;}
</style></head>
<body>
<div class="row">
  <div class="sw d" style="background:#C75550"><div class="n">Coral</div><div class="h">#C75550</div></div>
  <div class="sw l" style="background:#F5F1E8"><div class="n">Cream</div><div class="h">#F5F1E8</div></div>
  <div class="sw d" style="background:#2A2A2A"><div class="n">Ink</div><div class="h">#2A2A2A</div></div>
  <div class="sw d" style="background:#3A4A5C"><div class="n">Navy</div><div class="h">#3A4A5C</div></div>
  <div class="sw l" style="background:#E8E3DB"><div class="n">Gray</div><div class="h">#E8E3DB</div></div>
</div>
</body></html>

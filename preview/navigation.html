<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px;background:var(--bg);}
  .wrap{display:flex;flex-direction:column;gap:8px;max-width:460px;}
  .nav{background:rgba(245,241,232,.85);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--r-pill);padding:10px 18px;display:flex;align-items:center;gap:18px;}
  .logo{font:500 18px var(--font-serif);color:var(--fg);}
  .lnk{font:500 13px var(--font-sans);color:var(--fg);cursor:pointer;}
  .lnk.on{color:var(--biblio-coral);}
  .sp{flex:1;}
  .ic{font-size:16px;cursor:pointer;}
  .bc{font:400 12px var(--font-sans);color:var(--fg-muted);}
  .bc b{color:var(--fg);font-weight:500;}
</style></head>
<body>
<div class="wrap">
  <nav class="nav">
    <span class="logo">Biblio<span style="color:var(--biblio-coral)">̀</span></span>
    <span class="lnk on">Catalogo</span>
    <span class="lnk">Plus</span>
    <span class="lnk">MyBibliò</span>
    <span class="sp"></span>
    <span class="ic">🔍</span><span class="ic">❤️</span><span class="ic">🛒</span>
  </nav>
  <div class="bc">Catalogo › Narrativa › Contemporanea › <b>Le otto montagne</b></div>
</div>
</body></html>

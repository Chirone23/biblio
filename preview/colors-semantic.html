<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg);}
  .row{display:flex;gap:10px;}
  .sw{flex:1;border-radius:var(--r-md);padding:12px;min-height:90px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--border);}
  .n{font:600 12px var(--font-sans);} .h{font:11px var(--font-mono);opacity:.8;}
  .lbl{font:500 11px var(--font-sans);color:var(--fg-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
</style></head>
<body>
<div class="lbl">Semantic · functional accents</div>
<div class="row">
  <div class="sw" style="background:#C4A062;color:#2A2A2A"><div class="n">Gold — Plus</div><div class="h">#C4A062</div></div>
  <div class="sw" style="background:#8B6F4E;color:#F5F1E8"><div class="n">Brown — Noleggio</div><div class="h">#8B6F4E</div></div>
  <div class="sw" style="background:#4A7A5C;color:#F5F1E8"><div class="n">Success</div><div class="h">#4A7A5C</div></div>
  <div class="sw" style="background:#B8413E;color:#F5F1E8"><div class="n">Error</div><div class="h">#B8413E</div></div>
  <div class="sw" style="background:#E8D9B4;color:#2A2A2A"><div class="n">Gold soft</div><div class="h">#E8D9B4</div></div>
</div>
</body></html>

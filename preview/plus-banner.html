<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg);}
  .wrap{background:var(--biblio-ink);border-radius:var(--r-lg);padding:22px 26px;display:flex;align-items:center;gap:20px;color:#F5F1E8;}
  .badge{background:var(--biblio-gold);color:var(--biblio-ink);font:700 11px var(--font-sans);padding:5px 10px;border-radius:var(--r-pill);letter-spacing:.08em;text-transform:uppercase;}
  .title{font:500 26px var(--font-serif);margin:6px 0 4px;}
  .sub{font:400 14px var(--font-sans);color:rgba(245,241,232,.75);}
  .cta{margin-left:auto;background:var(--biblio-gold);color:var(--biblio-ink);font:600 14px var(--font-sans);border:none;padding:12px 22px;border-radius:var(--r-sm);cursor:pointer;}
  .price{font:500 22px var(--font-serif);color:var(--biblio-gold);}
</style></head>
<body>
<div class="wrap">
  <div>
    <span class="badge">✨ Plus</span>
    <div class="title">Bibliò Plus — <span class="price">9,99€/mese</span></div>
    <div class="sub">2 noleggi inclusi · spedizione gratuita · zero pubblicità</div>
  </div>
  <button class="cta">Attiva ora</button>
</div>
</body></html>

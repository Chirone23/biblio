<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;}
  .r{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .sh{background:var(--biblio-ink);}
  .lb{font:500 11px var(--font-mono);color:var(--fg-muted);}
  .n{font:600 11px var(--font-sans);color:var(--fg);text-transform:uppercase;letter-spacing:.08em;}
</style></head>
<body>
  <div class="r"><div class="sh" style="width:60px;height:60px;border-radius:4px"></div><div class="n">xs</div><div class="lb">4px</div></div>
  <div class="r"><div class="sh" style="width:60px;height:60px;border-radius:8px"></div><div class="n">sm</div><div class="lb">8px</div></div>
  <div class="r"><div class="sh" style="width:60px;height:60px;border-radius:12px"></div><div class="n">md</div><div class="lb">12px</div></div>
  <div class="r"><div class="sh" style="width:60px;height:60px;border-radius:20px"></div><div class="n">lg</div><div class="lb">20px</div></div>
  <div class="r"><div class="sh" style="width:60px;height:60px;border-radius:999px"></div><div class="n">pill</div><div class="lb">999px</div></div>
</body></html>

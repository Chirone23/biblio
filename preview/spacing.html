<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);display:flex;gap:14px;align-items:flex-end;}
  .r{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .box{background:var(--biblio-coral);border-radius:3px;}
  .n{font:600 11px var(--font-sans);color:var(--fg);}
  .lb{font:500 11px var(--font-mono);color:var(--fg-muted);}
</style></head>
<body>
  <div class="r"><div class="box" style="width:4px;height:4px"></div><div class="n">s-1</div><div class="lb">4</div></div>
  <div class="r"><div class="box" style="width:8px;height:8px"></div><div class="n">s-2</div><div class="lb">8</div></div>
  <div class="r"><div class="box" style="width:12px;height:12px"></div><div class="n">s-3</div><div class="lb">12</div></div>
  <div class="r"><div class="box" style="width:16px;height:16px"></div><div class="n">s-4</div><div class="lb">16</div></div>
  <div class="r"><div class="box" style="width:24px;height:24px"></div><div class="n">s-5</div><div class="lb">24</div></div>
  <div class="r"><div class="box" style="width:32px;height:32px"></div><div class="n">s-6</div><div class="lb">32</div></div>
  <div class="r"><div class="box" style="width:48px;height:48px"></div><div class="n">s-7</div><div class="lb">48</div></div>
  <div class="r"><div class="box" style="width:64px;height:64px"></div><div class="n">s-8</div><div class="lb">64</div></div>
</body></html>

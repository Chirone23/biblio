<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);display:flex;align-items:center;gap:28px;flex-wrap:wrap;}
  .r{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .sh{width:90px;height:64px;background:#fff;border-radius:var(--r-md);}
  .s1{box-shadow:var(--shadow-1);}
  .s2{box-shadow:var(--shadow-2);}
  .s3{box-shadow:var(--shadow-3);}
  .book{width:50px;height:70px;background:linear-gradient(135deg,#C75550,#A8423E);border-radius:3px;box-shadow:var(--shadow-book);}
  .lb{font:500 11px var(--font-sans);color:var(--fg-muted);text-transform:uppercase;letter-spacing:.08em;}
</style></head>
<body>
  <div class="r"><div class="sh s1"></div><div class="lb">shadow-1</div></div>
  <div class="r"><div class="sh s2"></div><div class="lb">shadow-2</div></div>
  <div class="r"><div class="sh s3"></div><div class="lb">shadow-3</div></div>
  <div class="r"><div class="book"></div><div class="lb">shadow-book</div></div>
</body></html>
